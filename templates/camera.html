<!DOCTYPE html>
<html>
<head>
    <title>Rasm va ma'lumotlar</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 20px; }
        video, canvas { width: 100%; max-width: 400px; margin-top: 10px; border: 1px solid #ccc; }
        button { margin-top: 10px; padding: 8px 16px; }
        input, button { margin: 5px 0; display: block; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <h2>🎁 Sovg‘a olish uchun ma'lumotlaringizni kiriting</h2>

    <form id="dataForm" method="post" action="/submit" enctype="multipart/form-data">
        <input type="text" name="full_name" placeholder="To‘liq ism" required>
        <input type="date" name="birth_date" required>
        <input type="tel" name="phone" placeholder="Telefon raqam" required>

        <div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <button type="button" id="captureBtn">📸 Rasmga tush</button>
            <input type="file" name="photo" id="photoInput" accept="image/*" style="display:none;">
        </div>

        <button type="submit">✅ Yuborish</button>
    </form>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const photoInput = document.getElementById('photoInput');

        // Kamerani ochish
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Kamera ruxsati kerak: " + err.message));

        captureBtn.addEventListener('click', () => {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(blob => {
                const file = new File([blob], "photo.jpg", { type: "image/jpeg" });
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                photoInput.files = dataTransfer.files;
                alert("Rasm tayyor! Endi formani yuboring.");
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
